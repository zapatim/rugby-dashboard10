<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#101014">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="app_icon.png">
<title>Rugby Dashboard</title>
<style>
:root{
  --bg:#101014;--panel:rgba(31,31,38,.92);--muted:#aaaab5;--gold:#f6b943;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:
radial-gradient(circle at 50% -25%,#292934 0,#15151b 42%,#0d0d11 100%);
color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
body{min-height:100vh}
main{width:min(980px,calc(100% - 48px));margin:0 auto;padding:38px 0 46px}
header{display:flex;justify-content:space-between;align-items:flex-end;margin:0 5px 26px}
.title-row{display:flex;align-items:center;gap:12px}
.ball{font-size:38px;filter:drop-shadow(0 5px 12px rgba(0,0,0,.35))}
h1{font-size:34px;line-height:1;margin:0;letter-spacing:-1px}
.sub,.today{color:var(--muted);font-size:15px}
.sub{margin-top:8px}
.cards{display:grid;gap:18px}
.card{
  position:relative;overflow:hidden;
  min-height:155px;padding:22px 26px;
  display:grid;grid-template-columns:112px 1fr auto;gap:24px;align-items:center;
  background:linear-gradient(135deg,rgba(36,36,44,.97),rgba(27,27,33,.97));
  border:1px solid color-mix(in srgb,var(--accent) 72%,white 8%);
  border-radius:27px;
  box-shadow:0 20px 42px rgba(0,0,0,.28),inset 0 1px rgba(255,255,255,.045)
}
.card:before{
  content:"";position:absolute;inset:0 auto 0 0;width:5px;background:var(--accent);
  box-shadow:0 0 25px var(--accent)
}
.logo-wrap{
  width:108px;height:108px;display:grid;place-items:center;
}
.logo{
  display:block;max-width:104px;max-height:104px;width:auto;height:auto;
  object-fit:contain;filter:drop-shadow(0 7px 10px rgba(0,0,0,.38))
}
.team{
  color:#ededf2;font-weight:800;font-size:15px;letter-spacing:.7px;text-transform:uppercase
}
.opp{font-size:28px;font-weight:850;line-height:1.08;letter-spacing:-.5px;margin:6px 0 11px}
.meta{color:var(--muted);font-size:16px;line-height:1.55}
.count{
  padding:10px 14px;border-radius:14px;background:rgba(246,185,67,.105);
  color:var(--gold);font-weight:900;font-size:23px;white-space:nowrap
}
footer{text-align:center;color:#777783;font-size:12px;margin-top:25px}
@media(max-width:720px){
  main{width:min(100% - 24px,980px);padding-top:24px}
  h1{font-size:28px}
  .card{grid-template-columns:82px 1fr;padding:19px;gap:16px}
  .logo-wrap{width:80px;height:80px}
  .logo{max-width:78px;max-height:78px}
  .opp{font-size:22px}
  .count{grid-column:2;justify-self:start;font-size:18px}
}
</style>
</head>
<body>
<main>
<header>
  <div>
    <div class="title-row"><span class="ball">🏉</span><h1>Prochains matchs</h1></div>
    <div class="sub">MHR Espoirs · Crabos · RCO Salagou</div>
  </div>
  <div id="today" class="today"></div>
</header>
<section class="cards" id="cards"></section>
<footer>Mise à jour automatique selon la date du Mac.</footer>
</main>
<script>
const TEAMS=[
{name:"MHR Espoirs",accent:"#72237e"},
{name:"Crabos",accent:"#da2638"},
{name:"RCO Salagou",accent:"#27865d"}
];
const months=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function niceDate(d){const day=days[d.getDay()];return day[0].toUpperCase()+day.slice(1)+" "+d.getDate()+" "+months[d.getMonth()]}
function countdown(d){
  const now=new Date();now.setHours(0,0,0,0);
  const n=Math.round((d-now)/86400000);
  if(n===0)return"AUJOURD’HUI";
  if(n===1)return"DEMAIN";
  return n>1?"J-"+n:"PASSÉ";
}
fetch("matches.json?"+Date.now())
.then(r=>r.json())
.then(matches=>{
  const now=new Date();now.setHours(0,0,0,0);
  cards.innerHTML=TEAMS.map(team=>{
    const match=matches
      .filter(m=>m.team===team.name&&parseDate(m.date)>=now)
      .sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(!match)return `<article class="card" style="--accent:${team.accent}">
      <div></div><div><div class="team">${team.name}</div><div class="opp">Fin de saison</div></div></article>`;
    const date=parseDate(match.date);
    return `<article class="card" style="--accent:${team.accent}">
      <div class="logo-wrap"><img class="logo" src="${match.opponent_slug}.png" alt="Logo ${match.opponent}"></div>
      <div>
        <div class="team">${team.name}</div>
        <div class="opp">${match.opponent}</div>
        <div class="meta">${match.venue_emoji} ${match.venue_label}<br>📅 ${niceDate(date)}</div>
      </div>
      <div class="count">${countdown(date)}</div>
    </article>`;
  }).join("");
});
today.textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
if("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
</script>
</body>
</html>
