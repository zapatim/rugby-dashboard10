<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#141418"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="app_icon.png"><title>Rugby Dashboard</title><style>
:root{--bg:#111114;--card:#1d1d23;--muted:#b7b7c0;--gold:#f2b443}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#111114,#18181d);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;min-height:100vh}main{max-width:780px;margin:auto;padding:calc(24px + env(safe-area-inset-top)) 18px 40px}header{display:flex;justify-content:space-between;align-items:flex-end;margin:6px 2px 22px}h1{margin:0;font-size:31px;letter-spacing:-.8px}.sub{color:var(--muted);font-size:14px}.cards{display:grid;gap:15px}.card{background:rgba(29,29,35,.96);border:2px solid var(--accent);border-radius:25px;padding:18px;display:grid;grid-template-columns:78px 1fr auto;gap:15px;align-items:center;box-shadow:0 14px 35px rgba(0,0,0,.22)}.logo{width:74px;height:74px;object-fit:contain;filter:drop-shadow(0 5px 8px rgba(0,0,0,.25))}.team{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#e9e9ed}.opp{font-size:23px;font-weight:800;line-height:1.08;margin:5px 0 8px}.meta{font-size:15px;color:var(--muted);line-height:1.55}.count{font-size:22px;font-weight:900;color:var(--gold);text-align:right;white-space:nowrap}footer{color:#85858f;font-size:12px;text-align:center;margin-top:24px}@media(max-width:560px){.card{grid-template-columns:62px 1fr}.logo{width:58px;height:58px}.count{grid-column:2;text-align:left;font-size:19px}.opp{font-size:20px}}</style></head><body><main><header><div><h1>🏉 Prochains matchs</h1><div class="sub">MHR Espoirs · Crabos · RCO Salagou</div></div><div id="today" class="sub"></div></header><section class="cards" id="cards"></section><footer>Mise à jour automatique selon la date de l’iPhone.</footer></main><script>
const T=[{name:"MHR Espoirs",accent:"#5D1E68"},{name:"Crabos",accent:"#BE1E2D"},{name:"RCO Salagou",accent:"#1F6748"}],mo=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"],da=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];function pd(s){let[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}function nd(d){let x=da[d.getDay()];return x[0].toUpperCase()+x.slice(1)+" "+d.getDate()+" "+mo[d.getMonth()]}function cd(d){let n=new Date();n.setHours(0,0,0,0);let x=Math.round((d-n)/86400000);return x===0?"AUJOURD’HUI":x===1?"DEMAIN":x>1?"J-"+x:"PASSÉ"}fetch("matches.json?"+Date.now()).then(r=>r.json()).then(all=>{let n=new Date();n.setHours(0,0,0,0);cards.innerHTML=T.map(t=>{let m=all.filter(x=>x.team===t.name&&pd(x.date)>=n).sort((a,b)=>a.date.localeCompare(b.date))[0];if(!m)return `<article class="card" style="--accent:${t.accent}"><div></div><div><div class="team">${t.name}</div><div class="opp">Fin de saison</div></div></article>`;let d=pd(m.date);return `<article class="card" style="--accent:${t.accent}"><img class="logo" src="${m.opponent_slug}.png"><div><div class="team">${t.name}</div><div class="opp">${m.opponent}</div><div class="meta">${m.venue_emoji} ${m.venue_label}<br>📅 ${nd(d)}</div></div><div class="count">${cd(d)}</div></article>`}).join("")});today.textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"short"});if("serviceWorker"in navigator)navigator.serviceWorker.register("service-worker.js")</script></body></html>
