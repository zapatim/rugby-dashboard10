<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b0b10">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="app_icon.png">
<title>Prochains matchs</title>
<style>
:root{
  --bg:#0b0b10;
  --panel:rgba(31,31,39,.76);
  --panel-2:rgba(20,20,27,.86);
  --text:#f7f7fa;
  --muted:#a6a6b0;
  --gold:#f6bd58;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:
  radial-gradient(circle at 50% -18%,rgba(80,80,102,.36),transparent 38%),
  radial-gradient(circle at 12% 25%,rgba(123,44,139,.12),transparent 30%),
  linear-gradient(180deg,#15151c 0%,#0d0d12 55%,#09090d 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}
body{min-height:100vh}
main{width:min(1020px,calc(100% - 56px));margin:0 auto;padding:42px 0 48px}
header{display:flex;justify-content:space-between;align-items:flex-end;margin:0 8px 28px}
.title-row{display:flex;align-items:center;gap:13px}
.ball{font-size:38px;filter:drop-shadow(0 7px 14px rgba(0,0,0,.42))}
h1{font-size:36px;line-height:1;margin:0;letter-spacing:-1.2px}
.sub,.today{color:var(--muted);font-size:15px}
.sub{margin-top:9px}
.today{padding-bottom:2px}
.cards{display:grid;gap:20px}
.card{
  --accent:#777;
  position:relative;overflow:hidden;
  min-height:170px;
  padding:25px 28px 25px 31px;
  display:grid;
  grid-template-columns:132px minmax(0,1fr) auto;
  gap:25px;
  align-items:center;
  background:
    linear-gradient(135deg,rgba(255,255,255,.055),transparent 35%),
    linear-gradient(145deg,var(--panel),var(--panel-2));
  border:1px solid color-mix(in srgb,var(--accent) 34%,rgba(255,255,255,.14));
  border-radius:30px;
  box-shadow:
    0 24px 52px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(18px) saturate(125%);
  -webkit-backdrop-filter:blur(18px) saturate(125%);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 30px 62px rgba(0,0,0,.39),inset 0 1px 0 rgba(255,255,255,.075);
  border-color:color-mix(in srgb,var(--accent) 52%,rgba(255,255,255,.18));
}
.card:before{
  content:"";
  position:absolute;inset:0 auto 0 0;width:7px;
  background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 92%,white 8%),var(--accent));
  box-shadow:0 0 30px color-mix(in srgb,var(--accent) 72%,transparent);
}
.card:after{
  content:"";
  position:absolute;left:-65px;top:-70px;width:260px;height:260px;
  background:radial-gradient(circle,color-mix(in srgb,var(--accent) 18%,transparent),transparent 68%);
  pointer-events:none;
}
.logo-wrap{
  width:124px;height:124px;display:grid;place-items:center;
  border-radius:28px;
  background:rgba(255,255,255,.025);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.logo{
  display:block;
  max-width:116px;max-height:116px;width:auto;height:auto;
  object-fit:contain;
  filter:drop-shadow(0 9px 13px rgba(0,0,0,.46));
}
.logo.dark-logo{
  max-width:108px;
  max-height:108px;
  padding:13px;
  border-radius:24px;
  background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(232,232,237,.94));
  border:1px solid rgba(255,255,255,.78);
  box-shadow:
    0 12px 28px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.95);
  filter:none;
}
.team-line{display:flex;align-items:center;gap:9px}
.team-dot{
  width:10px;height:10px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 14px var(--accent);
  flex:none;
}
.team{
  color:#ededf3;font-weight:850;font-size:15px;letter-spacing:.8px;text-transform:uppercase
}
.opp{
  font-size:31px;font-weight:880;line-height:1.07;letter-spacing:-.7px;
  margin:7px 0 12px;
}
.meta{color:var(--muted);font-size:16px;line-height:1.65}
.badge{
  min-width:96px;text-align:center;
  padding:12px 16px;border-radius:16px;
  font-weight:950;font-size:24px;letter-spacing:.2px;white-space:nowrap;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 24px rgba(0,0,0,.18);
}
.badge.far{color:#f7c566;background:rgba(246,189,88,.12)}
.badge.week{color:#ffd167;background:rgba(255,193,64,.16)}
.badge.tomorrow{color:#ff9d52;background:rgba(255,126,48,.18)}
.badge.today-match{color:#ff6969;background:rgba(255,60,60,.19);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(255,74,74,0)}50%{box-shadow:0 0 28px rgba(255,74,74,.23)}}
footer{text-align:center;color:#747480;font-size:12px;margin-top:27px}
@media(max-width:740px){
  main{width:min(100% - 24px,1020px);padding-top:26px}
  h1{font-size:29px}
  .card{grid-template-columns:92px 1fr;padding:20px;gap:17px;min-height:148px}
  .logo-wrap{width:88px;height:88px;border-radius:22px}
  .logo{max-width:84px;max-height:84px}
  .opp{font-size:23px}
  .badge{grid-column:2;justify-self:start;font-size:19px;min-width:82px;padding:9px 13px}
}
</style>
</head>
<body>
<main>
<header>
  <div>
    <div class="title-row"><span class="ball">🏉</span><h1>Prochains matchs</h1></div>
    <div class="sub">MHR Espoirs · Crabos · RCO Salagou</div>
  </div>
  <div id="today" class="today"></div>
</header>

<section class="cards" id="cards"></section>
<footer>Mise à jour automatique selon la date du Mac.</footer>
</main>

<script>
const TEAMS=[
  {name:"MHR Espoirs",accent:"#7d2a8e"},
  {name:"Crabos",accent:"#e12d3d"},
  {name:"RCO Salagou",accent:"#2a9368"}
];

// Logos conçus pour un fond clair : ajoutez ici les slugs concernés.
const DARK_LOGOS=new Set([
  "provence_rugby"
]);
const months=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];

function parseDate(s){
  const [y,m,d]=s.split("-").map(Number);
  return new Date(y,m-1,d);
}
function niceDate(d){
  const day=days[d.getDay()];
  return day[0].toUpperCase()+day.slice(1)+" "+d.getDate()+" "+months[d.getMonth()];
}
function daysLeft(d){
  const now=new Date(); now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
function badgeInfo(d){
  const n=daysLeft(d);
  if(n===0)return{text:"AUJOURD’HUI",cls:"today-match"};
  if(n===1)return{text:"DEMAIN",cls:"tomorrow"};
  if(n>=2&&n<=7)return{text:"J-"+n,cls:"week"};
  return{text:n>1?"J-"+n:"PASSÉ",cls:"far"};
}

fetch("matches.json?"+Date.now())
.then(r=>r.json())
.then(matches=>{
  const now=new Date(); now.setHours(0,0,0,0);

  cards.innerHTML=TEAMS.map(team=>{
    const match=matches
      .filter(m=>m.team===team.name&&parseDate(m.date)>=now)
      .sort((a,b)=>a.date.localeCompare(b.date))[0];

    if(!match){
      return `<article class="card" style="--accent:${team.accent}">
        <div></div>
        <div>
          <div class="team-line"><span class="team-dot"></span><div class="team">${team.name}</div></div>
          <div class="opp">Fin de saison</div>
        </div>
      </article>`;
    }

    const date=parseDate(match.date);
    const badge=badgeInfo(date);
    const darkClass=DARK_LOGOS.has(match.opponent_slug)?" dark-logo":"";

    return `<article class="card" style="--accent:${team.accent}">
      <div class="logo-wrap">
        <img class="logo${darkClass}" src="${match.opponent_slug}.png" alt="Logo ${match.opponent}">
      </div>
      <div>
        <div class="team-line">
          <span class="team-dot"></span>
          <div class="team">${team.name}</div>
        </div>
        <div class="opp">${match.opponent}</div>
        <div class="meta">${match.venue_emoji} ${match.venue_label}<br>📅 ${niceDate(date)}</div>
      </div>
      <div class="badge ${badge.cls}">${badge.text}</div>
    </article>`;
  }).join("");
})
.catch(()=>{
  cards.innerHTML='<article class="card"><div></div><div><div class="opp">Impossible de charger les matchs</div></div></article>';
});

today.textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
</script>
</body>
</html>
