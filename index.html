<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#141418"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="app_icon.png"><title>Rugby Dashboard</title><style>
:root{--bg:#111114;--card:#1d1d23;--muted:#b7b7c0;--gold:#f2b443}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#111114,#18181d);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;min-height:100vh}main{max-width:780px;margin:auto;padding:calc(24px + env(safe-area-inset-top)) 18px 40px}header{display:flex;justify-content:space-between;align-items:flex-end;margin:6px 2px 22px}h1{margin:0;font-size:31px;letter-spacing:-.8px}.sub{color:var(--muted);font-size:14px}.cards{display:grid;gap:15px}.card{background:rgba(29,29,35,.96);border:2px solid var(--accent);border-radius:25px;padding:18px;display:grid;grid-template-columns:78px 1fr auto;gap:15px;align-items:center;box-shadow:0 14px 35px rgba(0,0,0,.22)}.logo{width:74px;height:74px;object-fit:contain;filter:drop-shadow(0 5px 8px rgba(0,0,0,.25))}.team{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#e9e9ed}.opp{font-size:23px;font-weight:800;line-height:1.08;margin:5px 0 8px}.meta{font-size:15px;color:var(--muted);line-height:1.55}.count{font-size:22px;font-weight:900;color:var(--gold);text-align:right;white-space:nowrap}footer{color:#85858f;font-size:12px;text-align:center;margin-top:24px}@media(max-width:560px){.card{grid-template-columns:62px 1fr}.logo{width:58px;height:58px}.count{grid-column:2;text-align:left;font-size:19px}.opp{font-size:20px}}</style></head><body><main><header><div><h1>🏉 Prochains matchs</h1><div class="sub">MHR Espoirs · Crabos · RCO Salagou</div></div><div id="today" class="sub"></div></header><section class="cards" id="cards"></section><footer>Mise à jour automatique selon la date de l’iPhone.</footer></main><script>
const T=[{name:"MHR Espoirs",accent:"#5D1E68"},{name:"Crabos",accent:"#BE1E2D"},{name:"RCO Salagou",accent:"#1F6748"}],mo=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"],da=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];function pd(s){let[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}function nd(d){let x=da[d.getDay()];return x[0].toUpperCase()+x.slice(1)+" "+d.getDate()+" "+mo[d.getMonth()]}function cd(d){let n=new Date();n.setHours(0,0,0,0);let x=Math.round((d-n)/86400000);return x===0?"AUJOURD’HUI":x===1?"DEMAIN":x>1?"J-"+x:"PASSÉ"}const OFFICIAL_LOGOS={
  "castres_olympique": "https://castres-olympique.com/wp-content/uploads/2026/02/16_9-1024x576.png",
  "stade_aurillacois": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Stade%20aurillacois%20Cantal%20Auvergne%202018.svg",
  "ca_brive_correze": "https://commons.wikimedia.org/wiki/Special:FilePath/Club%20athl%C3%A9tique%20Brive%20Corr%C3%A8ze%20Limousin%20logo.svg",
  "stade_toulousain": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Stade%20Toulousain%20Rugby.svg",
  "usa_perpignan": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20USA%20Perpignan%202017.svg",
  "provence_rugby": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Provence%20Rugby%20-%202021.svg",
  "fc_grenoble": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20FC%20Grenoble%20Rugby.svg",
  "oyonnax_rugby": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Oyonnax%20Rugby%202018.svg",
  "rc_toulon": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Rugby%20club%20toulonnais.svg",
  "cs_bourgoin_jallieu": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20CS%20Bourgoin-Jallieu%20rugby.svg",
  "nice": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Stade%20ni%C3%A7ois%20rugby.svg",
  "valence_romans_drome_rugby": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20Valence%20Romans%20Dr%C3%B4me%20Rugby.svg",
  "rumilly": "https://commons.wikimedia.org/wiki/Special:FilePath/Logo%20RCSR%20Rumilly.svg",
  "marseillan_rugby_club": "https://api-web.monclubhouse.ffr.fr/assets/2000d1d0-60dd-4b04-a164-df133fe199ce",
  "olympique_minervois_xv": "https://api-web.monclubhouse.ffr.fr/assets/f3ed8973-7a91-4349-8c37-ab0eea134ae8",
  "olympique_labruguiere_xv": "https://api-web.monclubhouse.ffr.fr/assets/e609de6a-77cc-4189-84fb-b3a09b433d78",
  "avenir_bleu_et_blanc": "https://api-web.monclubhouse.ffr.fr/assets/2e375bfc-717e-46c8-9fb9-7f13fbf73e43",
  "association_ouveillan_cuxac": "https://api-web.monclubhouse.ffr.fr/assets/a0770ac8-4631-4482-bd77-aba1f04a875b",
  "thore_rugby_club": "https://api-web.monclubhouse.ffr.fr/assets/3f35608e-ac55-4bf6-b0f0-f2d44db2f95f",
  "olympique_des_monts_de_lacaune": "https://api-web.monclubhouse.ffr.fr/assets/6ad4cbed-8d9d-4995-a5f1-38f5235b3ccf",
  "racing_club_villeneuvois": "https://api-web.monclubhouse.ffr.fr/assets/07009ded-38ab-4a06-b3e9-271deff6434e"
};
function logoFor(m){return OFFICIAL_LOGOS[m.opponent_slug]||m.opponent_slug+".png"}
fetch("matches.json?"+Date.now()).then(r=>r.json()).then(all=>{let n=new Date();n.setHours(0,0,0,0);cards.innerHTML=T.map(t=>{let m=all.filter(x=>x.team===t.name&&pd(x.date)>=n).sort((a,b)=>a.date.localeCompare(b.date))[0];if(!m)return `<article class="card" style="--accent:${t.accent}"><div></div><div><div class="team">${t.name}</div><div class="opp">Fin de saison</div></div></article>`;let d=pd(m.date);return `<article class="card" style="--accent:${t.accent}"><img class="logo" src="${logoFor(m)}" onerror="this.onerror=null;this.src=m.opponent_slug+'.png'"><div><div class="team">${t.name}</div><div class="opp">${m.opponent}</div><div class="meta">${m.venue_emoji} ${m.venue_label}<br>📅 ${nd(d)}</div></div><div class="count">${cd(d)}</div></article>`}).join("")});today.textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"short"});if("serviceWorker"in navigator)navigator.serviceWorker.register("service-worker.js")</script></body></html>
